# Visus backend stack. Provide secrets via a repo-root .env (compose auto-loads it):
#   GEMINI_API_KEY, JWT_SECRET, VISUS_TRACKER_SECRET, TOKEN_ENC_KEY  (generate with: openssl rand -hex 32)
# Then:  docker compose up --build
#
# Ollama (the llama3 variant-gen fallback) is intentionally NOT bundled — it's
# heavy. Set OLLAMA_BASE_URL to an external Ollama if you want the fallback;
# otherwise variant generation uses Gemini and degrades gracefully without it.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: visus
      POSTGRES_PASSWORD: visus
      POSTGRES_DB: visus
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U visus"]
      interval: 5s
      timeout: 5s
      retries: 10

  chroma:
    image: chromadb/chroma:latest
    volumes:
      - chromadata:/data
    ports:
      - "8001:8000"

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      chroma:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://visus:visus@postgres:5432/visus
      CHROMA_URL: http://chroma:8000
      PORT: 8080
      NODE_ENV: production
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      JWT_SECRET: ${JWT_SECRET}
      VISUS_TRACKER_SECRET: ${VISUS_TRACKER_SECRET}
      TOKEN_ENC_KEY: ${TOKEN_ENC_KEY}
      DASHBOARD_ORIGIN: ${DASHBOARD_ORIGIN:-http://localhost:3000}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
    ports:
      - "8080:8080"

volumes:
  pgdata:
  chromadata:
